name: Data Hub ingest

# Keeps the managed database fresh from the live open-data sources.
# Requires a repository secret DATABASE_URL pointing at a managed Postgres
# (see RUNBOOK.md §C). GitHub-hosted runners have outbound internet, so the
# StatCan / NS connectors fetch live; CIHI falls back to its vendored fixture.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

concurrency:
  group: data-hub-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set. See RUNBOOK.md §C."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install pipeline
        run: pip install -r pipeline/requirements.txt

      - name: Apply migrations + seed
        run: bash db/migrate.sh --seed

      - name: Ingest (live)
        run: python -m hapi_pipeline.cli ingest --live
        working-directory: pipeline

      - name: Show loaded observations
        run: python -m hapi_pipeline.cli observations
        working-directory: pipeline
