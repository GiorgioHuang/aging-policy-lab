name: Data Hub ingest

# Live ingestion into a managed Postgres (e.g. Neon). GitHub-hosted runners have
# outbound internet, so the StatCan / NS connectors fetch live; CIHI falls back
# to its vendored fixture. Requires a repository secret DATABASE_URL (RUNBOOK.md §C).
#
# Triggers: weekly schedule + manual dispatch. If DATABASE_URL is not set, the
# ingest job is skipped (not failed).

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

concurrency:
  group: data-hub-ingest
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.s.outputs.ok }}
    steps:
      - id: s
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret not set — skipping ingest. See RUNBOOK.md §C."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

  ingest:
    needs: check
    if: needs.check.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install pipeline
        run: pip install -r pipeline/requirements.txt

      - name: Apply migrations + seed
        run: bash db/migrate.sh --seed

      - name: Ingest (live)
        run: python -m hapi_pipeline.cli ingest --live
        working-directory: pipeline

      - name: Seed Policy Library + compute HAPI + analytics
        run: |
          python -m hapi_pipeline.cli policies seed
          python -m hapi_pipeline.cli score
          python -m hapi_pipeline.cli literature seed
          python -m hapi_pipeline.cli analyze
        working-directory: pipeline

      - name: Show loaded observations
        run: python -m hapi_pipeline.cli observations
        working-directory: pipeline
